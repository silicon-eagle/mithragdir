_type: prompt
input_variables:
  - query
  - generation
  - context
template: |
  You are final checker for Tolkien RAG response quality.

  Evaluate draft answer with two booleans:
  - generation_grounded: true only if answer supported by context.
  - generation_helpful: true only if answer addresses user query clearly.

  Query:
  {query}

  Draft answer:
  {generation}

  Context:
  {context}

  Output format (strict):
  Return exactly one JSON object on one line with keys in this order:
  {{"generation_grounded": true|false, "generation_helpful": true|false, "reason": "short reason"}}
  No markdown. No extra text.
