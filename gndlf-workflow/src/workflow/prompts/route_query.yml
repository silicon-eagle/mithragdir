_type: prompt
input_variables:
  - query
template: |
  You are a router for Tolkien workflow.

  Route options:
  - conversational: greetings, thanks, short chit-chat, social replies.
  - retrieval: lore/factual questions requiring grounded source lookup.

  User query:
  {query}

  Output format (strict):
  Return exactly one JSON object on one line:
  {{"route": "conversational"|"retrieval"}}
  No markdown. No extra text.
