services:
  postgres-prd:
    image: postgres:latest
    container_name: redbook-postgress-prd
    restart: unless-stopped
    environment:
      POSTGRES_DB: redbook_prd
      POSTGRES_USER: redbook
      POSTGRES_PASSWORD: redbook
    ports:
      - '5432:5432'
    volumes:
      - postgres_prd_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U redbook -d redbook_prd']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-dev:
    image: postgres:latest
    container_name: redbook-postgress-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: redbook_dev
      POSTGRES_USER: redbook
      POSTGRES_PASSWORD: redbook
    ports:
      - '5433:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U redbook -d redbook_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant-prd:
    image: qdrant/qdrant:latest
    container_name: redbook-qdrant-prd
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_prd_storage:/qdrant/storage

  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: redbook-qdrant-dev
    restart: unless-stopped
    ports:
      - '7333:6333'
      - '7334:6334'
    volumes:
      - qdrant_dev_storage:/qdrant/storage

  ollama-gateway:
    image: nginx:alpine
    container_name: ollama-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: mithragdir-workspace
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ./:/workspace
    depends_on:
      postgres-prd:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
      qdrant-prd:
        condition: service_started
      qdrant-dev:
        condition: service_started
      ollama-gateway:
        condition: service_started
    stdin_open: true
    tty: true
    command: sleep infinity

volumes:
  postgres_prd_data:
  postgres_dev_data:
  qdrant_prd_storage:
  qdrant_dev_storage:
