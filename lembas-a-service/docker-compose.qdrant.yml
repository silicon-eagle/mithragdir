services:
  qdrant-prd:
    image: qdrant/qdrant:latest
    container_name: redbook-qdrant-prd
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_prd_storage:/qdrant/storage

  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: redbook-qdrant-dev
    restart: unless-stopped
    ports:
      - '7333:6333'
      - '7334:6334'
    volumes:
      - qdrant_dev_storage:/qdrant/storage

volumes:
  qdrant_prd_storage:
  qdrant_dev_storage:
