services:
  postgres:
    image: postgres:16-alpine
    container_name: redbook-postgress
    restart: unless-stopped
    environment:
      POSTGRES_DB: redbook
      POSTGRES_USER: redbook
      POSTGRES_PASSWORD: redbook
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U redbook -d redbook']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
